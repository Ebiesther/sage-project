<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Space</title>
  <link rel="stylesheet" href="craban.css">
  <script src="space.js"></script>
</head>
<body>

<div class="container">

  <h1>Name your space</h1>
  <p class="subtext">Required fields are marked with an asterisk *</p>

  <label>Name *</label>
  <input id="spaceName" type="text" placeholder="Try a team name, project goal, milestone...">

  <label>How your space is managed *</label>
  <select id="spaceType">
    <option>Please select</option>
    <option>Team-managed</option>
    <option>Company-managed</option>
  </select>
  
  <label>Access *</label>
  <select id="accessType">
    <option>Open</option>
    <option>Private</option>
  </select>

  </div>

  <div class="footer">
    <button id="createSpaceBtn"> <a href="done.html">Done</a></button>
  </div>

  
</div>

</body>
</html>
